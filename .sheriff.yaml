# Sheriff configuration. All available keys and their defaults are in .sheriff/config.yaml.

append:
    infra.exclude:
        - docs

override:
    php_cs_fixer.extend: "        'phpdoc_types' => ['groups' => ['meta', 'simple', 'alias'], 'exclude' => ['scalar', 'integer']],"
    phpstan.parameters:
        haspadar:
            afferentCoupling:
                maxAfferent: 10
                ignoreInterfaces: true
                ignoreAbstract: true
                excludedClasses:
                    - Primus\Text\TextOf
                    - Primus\Text\Mapped
                    - Primus\Func\FuncOf
                    - Primus\Scalar\ScalarOf
    # Empty subdirectory: tests live directly under php.tests (tests/),
    # not in tests/Unit. Sheriff appends the subdir, so "" resolves to tests/.
    phpunit.testsuites.unit: [""]
    phpunit.testsuites.integration: []
