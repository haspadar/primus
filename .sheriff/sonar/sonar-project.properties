sonar.organization=
sonar.projectKey=
sonar.sources=src
sonar.tests=tests
sonar.exclusions=
# Tests inevitably mirror each other (setup, asserts) and symmetric EO
# primitive pairs (HighestOf/LowestOf, PrefixOf/SuffixOf, …) intentionally
# duplicate structure for readability. CPD-excluding the whole tests/ tree
# plus the boundary pair keeps the duplication metric focused on real
# copy-paste smells in production code.
# TODO: drop this manual block once sheriff exposes sonar.cpd.exclusions.
sonar.cpd.exclusions=**/*Test.php,src/Scalar/HighestOf.php,src/Scalar/LowestOf.php
sonar.php.coverage.reportPaths=.sheriff/codecov/coverage.xml
